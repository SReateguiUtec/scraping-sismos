org: reateguisebastian
service: api-sismos-igp

provider:
  name: aws
  runtime: python3.13
  timeout: 30  # El scraping puede demorar unos segundos extra
  iam:
    role: arn:aws:iam::931952830916:role/LabRole

functions:
  extraer_sismos:
    handler: scraper.lambda_handler
    events:
      - http:
          path: /sismos/scraping
          method: post
          cors: true
          integration: lambda

resources:
  Resources:
    SismosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: SismosIGP
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true
